# aitcoin.conf — AITCOIN Node Configuration
# Place in: ~/.aitcoin/aitcoin.conf
# This file configures your aitcoind node on the VPS

# ─── Network ────────────────────────────────────────────────
server=1
daemon=1
listen=1

# ─── RPC (for AI Life Layer connection) ─────────────────────
rpcuser=aitcoinrpc
rpcpassword=REPLACE_WITH_STRONG_PASSWORD_HERE
rpcport=8332
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# ─── Peers ──────────────────────────────────────────────────
# addnode=seed1.aitcoin.io
# addnode=seed2.aitcoin.io

# ─── Performance ────────────────────────────────────────────
dbcache=512
maxconnections=32
txindex=1

# ─── Logging ────────────────────────────────────────────────
debug=0
printtoconsole=0
